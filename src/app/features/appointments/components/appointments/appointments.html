<app-page-table-title [childTableTitle]="pageTableTitle"></app-page-table-title>

<table class="table table-hover table-success table-bordered">
  <thead class="table-light">
    <tr>
      <th scope="col">Patient</th>
      <th scope="col">Doctor</th>
      <th scope="col">Department</th>
      <th scope="col">Date</th>
    </tr>
  </thead>

  @let appointments = (mappedAppointments$ | async);
  <tbody class="table-group-divider">
    @for(appointment of appointments; track appointment.id ) {
    <tr>
      <td scope="row">{{appointment.patient?.fullName}}</td>
      <td scope="row">{{appointment.doctor?.name}}</td>
      <td scope="row">{{appointment.doctor?.department?.name}}</td>
      <td scope="row">{{appointment.appointmentDate}}</td>
    </tr>
    }
  </tbody>

</table>
