<table class="table table-hover table-success table-bordered">
  <thead class="table-light">
   <tr>
    <th scope="col">Id</th>
    <th scope="col">Age</th>
    <th scope="col">Name</th>
    <th scope="col">Phone</th>
   </tr>
  </thead>
  <tbody class="table-group-divider">
    @for(patient of patients$ | async; track patient.id) {
      <tr>
        <th scope="row">{{patient.id}}</th>
        <td scope="row">{{patient.age}}</td>
        <td scope="row">{{patientName}}</td>
        <td scope="row">{{patient.phone}}</td>
      </tr>
     }
  </tbody>
</table>
